<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Expenses">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
        }

        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
        }

        .container {
            background: white;
            padding: 32px 24px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 640px) {
            .container {
                padding: 24px 16px;
                border-radius: 8px;
            }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
            text-align: center;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 1.6em;
            }
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="number"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            transition: border-color 0.3s;
            -webkit-appearance: none;
        }

        @media (max-width: 640px) {
            input[type="number"],
            input[type="text"] {
                font-size: 16px;
                min-height: 44px;
            }
        }

        input[type="number"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
            min-height: 44px;
        }

        .btn-primary {
            width: 100%;
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-export {
            background: #28a745;
            color: white;
        }

        .btn-export:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            font-size: 13px;
            padding: 6px 10px;
            min-height: unset;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 28px 0 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }

        .section-header h2 {
            color: #333;
            font-size: 1.1em;
        }

        .expenses-list {
            list-style: none;
            margin-bottom: 10px;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 5px;
            margin-bottom: 8px;
            background: #f8f9fa;
            gap: 8px;
        }

        .expense-item:nth-child(even) {
            background: #f0f2ff;
        }

        .expense-details {
            flex: 1;
            min-width: 0;
        }

        .expense-item-name {
            font-weight: 500;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .expense-item-date {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .expense-amount {
            font-weight: 600;
            color: #667eea;
            white-space: nowrap;
        }

        .no-expenses {
            text-align: center;
            color: #999;
            padding: 20px 0;
            font-style: italic;
        }

        .location-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .location-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .location-group label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: 400;
        }

        .expense-item-location {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .expense-item-location a {
            color: #667eea;
            text-decoration: none;
        }

        .expense-item-location a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Expense Tracker</h1>
        <p class="subtitle">Track your expenses locally — no account needed</p>

        <div id="message" class="message"></div>

        <form id="expenseForm">
            <div class="form-group">
                <label for="amount">Amount ($)</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0.01" required placeholder="0.00">
            </div>

            <div class="form-group">
                <label for="item">Item / Description</label>
                <input type="text" id="item" name="item" required placeholder="e.g., Coffee, Lunch, Gas">
            </div>

            <div class="location-group">
                <input type="checkbox" id="captureLocation" name="captureLocation">
                <label for="captureLocation">Capture my location</label>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">Add Expense</button>
        </form>

        <div class="section-header">
            <h2>Recent Expenses</h2>
            <button class="btn btn-export" id="exportBtn">Export CSV</button>
        </div>

        <ul class="expenses-list" id="expensesList">
            <li class="no-expenses" id="noExpenses">No expenses yet. Add your first one above!</li>
        </ul>
    </div>

    <script>
        // ── IndexedDB setup ──────────────────────────────────────────────────
        const DB_NAME = 'expenseTrackerDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'expenses';

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('timestamp', 'timestamp', { unique: false });
                    }
                };

                request.onsuccess = (event) => resolve(event.target.result);
                request.onerror = (event) => reject(event.target.error);
            });
        }

        function addExpenseToDB(db, expense) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.add(expense);
                request.onsuccess = () => resolve(request.result);
                request.onerror = (event) => reject(event.target.error);
            });
        }

        function getAllExpenses(db) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.index('timestamp').getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = (event) => reject(event.target.error);
            });
        }

        function deleteExpenseFromDB(db, id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = (event) => reject(event.target.error);
            });
        }

        // ── Geolocation helper ───────────────────────────────────────────────
        function getCurrentLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('Geolocation is not supported by your browser.'));
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => resolve({
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: position.coords.accuracy
                    }),
                    (error) => reject(error),
                    { timeout: 10000, maximumAge: 0 }
                );
            });
        }

        function getLocationErrorMessage(error) {
            if (!error || !error.code) return error.message || 'Unknown error';
            switch (error.code) {
                case 1: return 'Location permission denied';
                case 2: return 'Location unavailable';
                case 3: return 'Location request timed out';
                default: return error.message || 'Unknown error';
            }
        }

        // ── App state ────────────────────────────────────────────────────────
        let db = null;

        async function init() {
            db = await openDB();
            await renderExpenses();
        }

        // ── Rendering ────────────────────────────────────────────────────────
        async function renderExpenses() {
            const expenses = await getAllExpenses(db);
            const list = document.getElementById('expensesList');
            const noExpenses = document.getElementById('noExpenses');

            // Clear existing expense items (keep the noExpenses placeholder)
            Array.from(list.querySelectorAll('.expense-item')).forEach(el => el.remove());

            if (expenses.length === 0) {
                noExpenses.style.display = 'block';
                return;
            }

            noExpenses.style.display = 'none';

            // Show newest first
            expenses.slice().reverse().forEach(expense => {
                const li = document.createElement('li');
                li.className = 'expense-item';
                li.dataset.id = expense.id;

                const date = new Date(expense.timestamp);
                const dateStr = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                const timeStr = date.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });

                li.innerHTML = `
                    <div class="expense-details">
                        <div class="expense-item-name">${escapeHtml(expense.item)}</div>
                        <div class="expense-item-date">${dateStr} ${timeStr}</div>
                        ${(typeof expense.latitude === 'number' && expense.latitude >= -90 && expense.latitude <= 90 &&
                           typeof expense.longitude === 'number' && expense.longitude >= -180 && expense.longitude <= 180)
                            ? `<div class="expense-item-location"><a href="https://www.openstreetmap.org/?mlat=${expense.latitude}&mlon=${expense.longitude}&zoom=16" target="_blank" rel="noopener noreferrer">📍 ${expense.latitude.toFixed(4)}, ${expense.longitude.toFixed(4)}</a></div>`
                            : ''}
                    </div>
                    <span class="expense-amount">$${parseFloat(expense.amount).toFixed(2)}</span>
                    <button class="btn btn-danger delete-btn" data-id="${expense.id}" aria-label="Delete expense">✕</button>
                `;

                list.appendChild(li);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // ── Form submission ──────────────────────────────────────────────────
        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const amount = document.getElementById('amount').value;
            const item = document.getElementById('item').value.trim();

            if (!amount || !item) {
                showMessage('Both amount and item are required.', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving…';

            let locationData = null;
            if (document.getElementById('captureLocation').checked) {
                submitBtn.textContent = 'Getting location…';
                try {
                    locationData = await getCurrentLocation();
                } catch (err) {
                    showMessage('Could not get location: ' + getLocationErrorMessage(err) + '. Saving without location.', 'error');
                }
                submitBtn.textContent = 'Saving…';
            }

            try {
                const expense = {
                    amount: parseFloat(amount),
                    item: item,
                    timestamp: Date.now()
                };
                if (locationData) {
                    expense.latitude = locationData.latitude;
                    expense.longitude = locationData.longitude;
                    expense.accuracy = locationData.accuracy;
                }

                await addExpenseToDB(db, expense);
                showMessage('Expense added!', 'success');
                document.getElementById('expenseForm').reset();
                await renderExpenses();
            } catch (error) {
                console.error('Error saving expense:', error);
                showMessage('Failed to save expense. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Add Expense';
            }
        });

        // ── Delete expense ───────────────────────────────────────────────────
        document.getElementById('expensesList').addEventListener('click', async (e) => {
            const btn = e.target.closest('.delete-btn');
            if (!btn) return;

            const id = parseInt(btn.dataset.id, 10);
            try {
                await deleteExpenseFromDB(db, id);
                await renderExpenses();
            } catch (error) {
                console.error('Error deleting expense:', error);
                showMessage('Failed to delete expense.', 'error');
            }
        });

        // ── CSV Export ───────────────────────────────────────────────────────
        document.getElementById('exportBtn').addEventListener('click', async () => {
            const expenses = await getAllExpenses(db);

            if (expenses.length === 0) {
                showMessage('No expenses to export.', 'error');
                return;
            }

            const rows = [['Date', 'Item', 'Amount', 'Latitude', 'Longitude']];
            expenses.forEach(expense => {
                const date = new Date(expense.timestamp).toLocaleString();
                rows.push([
                    `"${date}"`,
                    `"${expense.item.replace(/"/g, '""')}"`,
                    expense.amount.toFixed(2),
                    expense.latitude != null && typeof expense.latitude === 'number' && expense.latitude >= -90 && expense.latitude <= 90 ? expense.latitude : '',
                    expense.longitude != null && typeof expense.longitude === 'number' && expense.longitude >= -180 && expense.longitude <= 180 ? expense.longitude : ''
                ]);
            });

            const csvContent = rows.map(r => r.join(',')).join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `expenses_${new Date().toISOString().slice(0, 10)}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        // ── Message helpers ──────────────────────────────────────────────────
        let messageTimer = null;

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = `message ${type} show`;
            clearTimeout(messageTimer);
            messageTimer = setTimeout(() => {
                el.className = 'message';
            }, 5000);
        }

        // ── Bootstrap ────────────────────────────────────────────────────────
        init().catch(err => {
            console.error('Failed to initialize database:', err);
            document.getElementById('message').textContent = 'Could not open local database. Please check your browser settings.';
            document.getElementById('message').className = 'message error show';
        });

        // ── Service Worker ───────────────────────────────────────────────────
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => {
                console.warn('Service worker registration failed:', err);
            });
        }
    </script>
</body>
</html>
